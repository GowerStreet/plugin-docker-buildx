when:
  - event: push
    branch: main

steps:
  # Build an amd64 staging image using the upstream plugin (woodpeckerci/plugin-docker-buildx
  # has amd64 support). Pushes to a staging tag so the next step can pull and verify it.
  build-staging:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: gowerstreet/plugin-docker-buildx
      tags: staging-${CI_PIPELINE_NUMBER}
      platforms: linux/amd64
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password

  # Use the freshly built staging image as the plugin to publish with final tags.
  # This verifies the new image functions correctly as a plugin before it becomes :latest.
  publish:
    image: gowerstreet/plugin-docker-buildx:staging-${CI_PIPELINE_NUMBER}
    settings:
      repo: gowerstreet/plugin-docker-buildx
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      tags:
        - latest
        - ${CI_PIPELINE_NUMBER}
      platforms:
        - linux/amd64
        - linux/arm64
    when:
      - event: push
        branch: main
        status: success
