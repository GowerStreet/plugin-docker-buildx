when:
  - event: push
    branch: main

steps:
  # ONE-OFF BOOTSTRAP (temporary; revert after it succeeds).
  #
  # The self-hosted `gowerstreet/plugin-docker-buildx:latest` on Docker Hub is an
  # arm64-only image, so on our amd64 CI host it runs under qemu emulation and its
  # nested dockerd dies (iptables-nft is unsupported under emulation). That makes it
  # impossible to build ourselves with ourselves. Break the cycle by building the
  # image once with the upstream reference plugin (multi-arch, runs natively), which
  # publishes a correct multi-arch `latest`. After this run lands, restore the
  # self-hosting pipeline.
  bootstrap:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      repo: gowerstreet/plugin-docker-buildx
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      tags:
        - latest
        - ${CI_PIPELINE_NUMBER}
      platforms:
        - linux/amd64
        - linux/arm64
