when:
  - event: push
    branch: main

steps:
  # Build the plugin image using the current production image, loading the result
  # into the local Docker daemon only (no push to registry). Single-platform
  # (linux/amd64) is enough here — we just need a runnable image for the next step.
  # This verifies the code builds cleanly before we publish anything.
  build-local:
    image: gowerstreet/plugin-docker-buildx
    privileged: true
    settings:
      repo: gowerstreet/plugin-docker-buildx
      tags: ci-${CI_PIPELINE_NUMBER}
      platforms: linux/amd64
      output: type=docker
      auto_cache: false

  # Run the freshly built local image as the plugin for the real publish.
  # This proves the new image works correctly as a plugin — not just that it
  # compiles — before the versioned tags are applied.
  publish:
    image: gowerstreet/plugin-docker-buildx:ci-${CI_PIPELINE_NUMBER}
    privileged: true
    settings:
      repo: gowerstreet/plugin-docker-buildx
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      tags:
        - latest
        - ${CI_PIPELINE_NUMBER}
      platforms:
        - linux/amd64
        - linux/arm64
    when:
      - event: push
        branch: main
        status: success
